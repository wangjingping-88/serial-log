name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本，例如 0.1.1
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 构建发布包
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 计算版本号
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "assemblyVersion=$version.0" >> $env:GITHUB_OUTPUT

      - name: 还原依赖
        run: dotnet restore SerialLog.sln

      - name: 运行测试
        run: dotnet test SerialLog.sln --no-restore --configuration Release

      - name: 发布 win-x64 便携版
        run: >
          dotnet publish src\SerialLog.App\SerialLog.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts\publish
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assemblyVersion }}
          -p:FileVersion=${{ steps.version.outputs.assemblyVersion }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: 打包 ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts\release -Force | Out-Null
          $zip = "artifacts\release\SerialLog-v${{ steps.version.outputs.version }}-win-x64-portable.zip"
          Compress-Archive -Path artifacts\publish\* -DestinationPath $zip -Force
          (Get-FileHash -Algorithm SHA256 $zip).Hash | Set-Content "$zip.sha256.txt"

      - name: 准备签名证书
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $certPath = "artifacts\signing-cert.pfx"
          $cerPath = "artifacts\release\SerialLog-v${{ steps.version.outputs.version }}-win-x64.cer"
          if ($env:WINDOWS_SIGNING_CERT_BASE64) {
            if (-not $env:WINDOWS_SIGNING_CERT_PASSWORD) {
              throw "WINDOWS_SIGNING_CERT_PASSWORD is required when WINDOWS_SIGNING_CERT_BASE64 is configured."
            }
            [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64) |
              Set-Content -AsByteStream $certPath
            $password = $env:WINDOWS_SIGNING_CERT_PASSWORD
            $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $certPath,
              $securePassword,
              [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable)
            [System.IO.File]::WriteAllBytes(
              $cerPath,
              $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
          } else {
            $password = [Guid]::NewGuid().ToString("N") + "Aa1!"
            $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
            $cert = New-SelfSignedCertificate `
              -Type Custom `
              -Subject "CN=SerialLog" `
              -FriendlyName "Serial Log Test Signing" `
              -KeyUsage DigitalSignature `
              -KeyAlgorithm RSA `
              -KeyLength 2048 `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
            Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $securePassword | Out-Null
            Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          }
          "::add-mask::$password"
          "SIGN_CERT_PATH=$certPath" >> $env:GITHUB_ENV
          "SIGN_CERT_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: 打包 MSIX
        shell: pwsh
        run: |
          .\scripts\package-msix.ps1 `
            -PublishDir artifacts\publish `
            -OutputPath "artifacts\release\SerialLog-v${{ steps.version.outputs.version }}-win-x64.msix" `
            -Version "${{ steps.version.outputs.assemblyVersion }}" `
            -SignCertificatePath $env:SIGN_CERT_PATH `
            -SignCertificatePassword $env:SIGN_CERT_PASSWORD

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SerialLog-v${{ steps.version.outputs.version }}-win-x64
          path: artifacts/release/*

      - name: 发布 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*
          generate_release_notes: true
