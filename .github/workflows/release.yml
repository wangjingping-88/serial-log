name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本，例如 0.1.1
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 构建发布包
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 计算版本号
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "assemblyVersion=$version.0" >> $env:GITHUB_OUTPUT

      - name: 还原依赖
        run: dotnet restore SerialLog.sln

      - name: 运行测试
        run: dotnet test SerialLog.sln --no-restore --configuration Release

      - name: 发布 win-x64 便携版
        run: >
          dotnet publish src\SerialLog.App\SerialLog.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts\publish
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assemblyVersion }}
          -p:FileVersion=${{ steps.version.outputs.assemblyVersion }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: 打包 ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts\release -Force | Out-Null
          $zip = "artifacts\release\SerialLog-v${{ steps.version.outputs.version }}-win-x64-portable.zip"
          Compress-Archive -Path artifacts\publish\* -DestinationPath $zip -Force
          (Get-FileHash -Algorithm SHA256 $zip).Hash | Set-Content "$zip.sha256.txt"

      - name: 准备签名证书
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
        run: |
          if ($env:WINDOWS_SIGNING_CERT_BASE64) {
            [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64) |
              Set-Content -AsByteStream artifacts\signing-cert.pfx
          }

      - name: 打包 MSIX
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $cert = ""
          $password = ""
          if (Test-Path artifacts\signing-cert.pfx) {
            $cert = "artifacts\signing-cert.pfx"
            $password = $env:WINDOWS_SIGNING_CERT_PASSWORD
          }
          .\scripts\package-msix.ps1 `
            -PublishDir artifacts\publish `
            -OutputPath "artifacts\release\SerialLog-v${{ steps.version.outputs.version }}-win-x64.msix" `
            -Version "${{ steps.version.outputs.assemblyVersion }}" `
            -SignCertificatePath $cert `
            -SignCertificatePassword $password

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SerialLog-v${{ steps.version.outputs.version }}-win-x64
          path: artifacts/release/*

      - name: 发布 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*
          generate_release_notes: true
